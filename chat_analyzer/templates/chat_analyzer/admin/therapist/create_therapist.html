{% extends "chat_analyzer/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Create Therapist {% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="fas fa-user-md"></i> Add New Therapist </h3>
                    <small> Create a therapist account </small>

                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primaty w-100 mt-3">
                            <i class="fas fa-save"></i> Create Therapist
                        </button>
                        <a href="{% url 'chat_analyzer:admin_therapist_list' %}" class="btn btn-secondary w-100 mt-2">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
