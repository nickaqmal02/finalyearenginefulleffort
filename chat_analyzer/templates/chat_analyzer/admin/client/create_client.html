{% extends "chat_analyzer/base.html" %}
{% load crispy_forms_tags %}

{% block title %} Client Registeration {% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Client Registeration</h3>
                    <small> please enter the details of client </small>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100"> Register Client </button>
                    </form>
                    <hr>
                   
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
